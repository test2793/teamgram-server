name: Build Teamgram

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build all services
        run: |
          mkdir -p out
          go build -o ./out/ ./app/...

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: teamgram-binaries
          path: out/
          retention-days: 7
